name: Release

on:
  push:
    branches: [main]
    paths: ['src/VERSION']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and create release
        run: |
          VERSION=$(tr -d '[:space:]' < src/VERSION)
          echo "Detected version: ${VERSION}"

          # Cross-check: every per-target manifest/marketplace at the repo root
          # MUST already declare the same version as src/VERSION. The maintainer
          # is expected to run bash scripts/compile-skills.sh before pushing the
          # version bump, which stamps src/VERSION into all four files. If they
          # forgot, fail loudly here rather than publishing a tag for a version
          # the manifests do not actually carry.
          MISMATCH=0
          for entry in \
            ".claude-plugin/plugin.json|.version|Claude manifest" \
            ".claude-plugin/marketplace.json|.plugins[0].version|Claude marketplace" \
            ".codex-plugin/plugin.json|.version|Codex manifest" \
            ".agents/plugins/marketplace.json|.plugins[0].version|Codex marketplace"; do
            file="${entry%%|*}"
            rest="${entry#*|}"
            jq_path="${rest%%|*}"
            label="${rest#*|}"
            if [ ! -f "$file" ]; then
              echo "Error: $file not found ($label)" >&2
              MISMATCH=1
              continue
            fi
            stamped=$(jq -r "$jq_path // empty" "$file")
            if [ "$stamped" != "$VERSION" ]; then
              echo "Error: $label at $file declares version '$stamped', expected '$VERSION' (from src/VERSION)" >&2
              echo "Maintainer: run 'bash scripts/compile-skills.sh' to stamp src/VERSION into all four root files, then push." >&2
              MISMATCH=1
            fi
          done
          if [ "$MISMATCH" -ne 0 ]; then
            exit 1
          fi
          echo "Version cross-check passed: src/VERSION and all four root manifest/marketplace files agree on $VERSION."

          # Skip if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists, skipping"
            exit 0
          fi

          # Extract latest changelog entry (first ## section),
          # strip the version header line, and promote headings by one level
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n '/^## /{p;:a;n;/^## /q;p;ba}' CHANGELOG.md \
              | tail -n +2 \
              | sed '/^####/{s/^####/###/;b}; s/^###/##/' )
          else
            NOTES="Release v${VERSION}"
          fi

          # Create tag and release
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${NOTES}"

          echo "Created release v${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}
